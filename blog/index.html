<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的博客</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #1c2128;
      --border: #30363d;
      --text: #e6edf3;
      --text2: #8b949e;
      --accent: #58a6ff;
      --accent2: #1f6feb;
      --tag-work: #3b82f6;
      --tag-invest: #10b981;
      --tag-life: #f59e0b;
      --tag-tech: #8b5cf6;
      --tag-book: #ec4899;
      --tag-eff: #14b8a6;
    }

    body {
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }

    /* ── Hero ── */
    .hero {
      position: relative;
      height: 100vh;
      min-height: 600px;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute; inset: 0;
      background: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=1800&q=90&fit=crop') center/cover no-repeat;
    }

    .hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(13,17,23,0.2) 0%,
        rgba(13,17,23,0.4) 50%,
        rgba(13,17,23,0.92) 100%
      );
    }

    .hero-content {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 0 20px;
    }

    .hero-badge {
      display: inline-block;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 4px 14px;
      border-radius: 99px;
      margin-bottom: 28px;
    }

    .hero h1 {
      font-size: clamp(2.5rem, 7vw, 5.5rem);
      font-weight: 800;
      line-height: 1.1;
      color: #fff;
      margin-bottom: 20px;
    }

    .hero-desc {
      font-size: 1.15rem;
      color: var(--text2);
      max-width: 520px;
      margin-bottom: 40px;
    }

    .hero-scroll {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: var(--text2);
      font-size: 0.8rem;
      animation: bounce 2s infinite;
      text-decoration: none;
    }

    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(8px); }
    }

    .hero-scroll svg { width: 20px; height: 20px; }

    /* ── Nav ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 16px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(13,17,23,0.75);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .nav-logo {
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
      text-decoration: none;
      letter-spacing: -0.02em;
    }

    .nav-links {
      display: flex;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      color: var(--text2);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: var(--text); }

    /* ── Signal images in article ── */
    .post-signal-imgs {
      display: flex;
      flex-direction: column;
      gap: 24px;
      margin: 24px 0;
    }
    .post-signal-imgs img {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    .post-signal-imgs .img-label {
      font-size: 0.78rem;
      color: var(--text2);
      text-align: center;
      margin-top: -16px;
      letter-spacing: 0.06em;
    }

    /* ── Section ── */
    .section {
      max-width: 1100px;
      margin: 0 auto;
      padding: 100px 24px;
    }

    .section-label {
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
    }

    .section-title {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 800;
      color: #fff;
      margin-bottom: 16px;
    }

    .section-desc {
      color: var(--text2);
      max-width: 520px;
      margin-bottom: 60px;
    }

    /* ── Article List ── */
    .article-list { display: flex; flex-direction: column; }

    .article-item {
      display: grid;
      grid-template-columns: 72px 1fr 140px;
      gap: 0 32px;
      align-items: center;
      padding: 28px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.2s;
    }

    .article-item:first-child { border-top: 1px solid var(--border); }

    .article-item:hover { background: rgba(88,166,255,0.03); }

    .article-num {
      font-size: 3rem;
      font-weight: 800;
      color: var(--border);
      line-height: 1;
      font-variant-numeric: tabular-nums;
      transition: color 0.3s;
    }

    .article-item:hover .article-num { color: var(--accent); opacity: 0.5; }

    .article-info { min-width: 0; }

    .article-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .tag {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      padding: 2px 8px;
      border-radius: 99px;
      color: #fff;
    }
    .tag-work { background: var(--tag-work); }
    .tag-invest { background: var(--tag-invest); }
    .tag-life { background: var(--tag-life); }
    .tag-tech { background: var(--tag-tech); }
    .tag-book { background: var(--tag-book); }
    .tag-eff { background: var(--tag-eff); }

    .article-date { font-size: 0.75rem; color: var(--text2); }

    .article-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
      line-height: 1.4;
      transition: color 0.2s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .article-item:hover .article-title { color: var(--accent); }

    .article-excerpt {
      font-size: 0.82rem;
      color: var(--text2);
      line-height: 1.5;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .article-thumb {
      width: 140px;
      height: 88px;
      object-fit: cover;
      border-radius: 8px;
      display: block;
      opacity: 0.7;
      transition: opacity 0.3s;
    }

    .article-item:hover .article-thumb { opacity: 1; }

    @media (max-width: 768px) {
      .article-item { grid-template-columns: 48px 1fr; gap: 0 16px; }
      .article-thumb { display: none; }
      .article-num { font-size: 2rem; }
    }

    /* ── Filter Bar ── */
    .filter-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 40px;
    }

    .filter-btn {
      padding: 6px 16px;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text2);
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── Pagination ── */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 60px;
    }

    .page-btn {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text2);
      font-size: 0.85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .page-btn:hover:not(:disabled) {
      border-color: var(--accent);
      color: var(--accent);
    }

    .page-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .page-nums {
      display: flex;
      gap: 6px;
    }

    .page-num {
      min-width: 36px;
      height: 36px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text2);
      font-size: 0.85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      padding: 0 6px;
    }

    .page-num:hover { border-color: var(--accent); color: var(--accent); }
    .page-num.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .page-ellipsis {
      color: var(--text2);
      font-size: 0.85rem;
      padding: 0 4px;
    }

    .result-count {
      text-align: center;
      color: var(--text2);
      font-size: 0.8rem;
      margin-top: 20px;
      margin-bottom: -20px;
    }

    /* Hidden article items */
    #articleList .article-item[data-hidden="true"] { display: none; }

    /* ── About ── */
    .about-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 60px;
      align-items: center;
    }

    .about-avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--border);
    }

    .about-text h3 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: #fff;
    }

    .about-text p {
      color: var(--text2);
      font-size: 0.95rem;
      margin-bottom: 24px;
      max-width: 480px;
    }

    .about-stats {
      display: flex;
      gap: 40px;
    }

    .stat { text-align: center; }

    .stat-num {
      font-size: 2rem;
      font-weight: 800;
      color: var(--accent);
      display: block;
    }

    .stat-label {
      font-size: 0.78rem;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* ── Divider ── */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0 24px;
    }

    /* ── Post Detail ── */
    .post-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,0.85);
      overflow-y: auto;
    }

    .post-overlay.active { display: block; }

    .post-modal {
      max-width: 720px;
      margin: 60px auto;
      background: var(--surface);
      border-radius: 20px;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .post-modal-img {
      width: 100%;
      height: 320px;
      object-fit: cover;
    }

    .post-modal-body { padding: 48px; }

    .post-modal-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .post-modal-title {
      font-size: 2rem;
      font-weight: 800;
      line-height: 1.3;
      color: #fff;
      margin-bottom: 28px;
    }

    .post-modal-content { color: var(--text); font-size: 1rem; line-height: 1.9; }
    .post-modal-content h2 { font-size: 1.3rem; margin: 32px 0 12px; color: #fff; }
    .post-modal-content p { margin-bottom: 16px; }
    .post-modal-content ul { margin: 0 0 16px 20px; }
    .post-modal-content li { margin-bottom: 6px; }
    .post-modal-content blockquote {
      border-left: 3px solid var(--accent);
      padding: 12px 20px;
      margin: 24px 0;
      background: var(--surface2);
      border-radius: 0 8px 8px 0;
      color: var(--text2);
      font-style: italic;
    }
    .post-modal-content strong { color: #fff; }

    .close-btn {
      position: fixed;
      top: 24px;
      right: 32px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 201;
      transition: background 0.2s;
    }

    .close-btn:hover { background: var(--surface2); }

    /* Back btn */
    .back-top {
      position: fixed;
      bottom: 32px;
      right: 32px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--accent2);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: none;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 50;
    }

    .back-top.show { opacity: 1; }

    @media (max-width: 768px) {
      nav { padding: 14px 20px; }
      .nav-links { display: none; }
      .section { padding: 60px 16px; }
      .about-grid { grid-template-columns: 1fr; gap: 32px; }
      .about-avatar { width: 80px; height: 80px; }
      .post-modal-body { padding: 28px 20px; }
      .post-modal-title { font-size: 1.5rem; }
      .post-modal-img { height: 220px; }
    }
  </style>
</head>
<body>

<!-- Nav -->
<nav>
  <a href="#" class="nav-logo">博客</a>
  <ul class="nav-links">
    <li><a href="#articles">文章</a></li>
    <li><a href="#about">关于</a></li>
  </ul>
</nav>

<!-- Hero -->
<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <span class="hero-badge">Personal Blog</span>
    <h1>记录生活<br>沉淀思考</h1>
    <p class="hero-desc">法制工作 · 投资实践 · 效率工具 · 城市探索</p>
    <a href="#articles" class="hero-scroll">
      <span>向下滚动</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 10l5 5 5-5"/></svg>
    </a>
  </div>
</section>

<!-- Articles -->
<section class="section" id="articles">
  <p class="section-label">Writing</p>
  <h2 class="section-title">全部文章</h2>
  <p class="section-desc">记录工作中的思考、投资里的实践、生活中的发现。</p>

  <!-- 标签筛选 -->
  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">全部</button>
    <button class="filter-btn" data-filter="工作" onclick="setFilter('工作')">工作</button>
    <button class="filter-btn" data-filter="投资" onclick="setFilter('投资')">投资</button>
    <button class="filter-btn" data-filter="效率" onclick="setFilter('效率')">效率</button>
    <button class="filter-btn" data-filter="技术" onclick="setFilter('技术')">技术</button>
    <button class="filter-btn" data-filter="生活" onclick="setFilter('生活')">生活</button>
    <button class="filter-btn" data-filter="读书" onclick="setFilter('读书')">读书</button>
  </div>

    <div id="articleList"></div>

  <!-- 分页 --></div>

  <!-- 分页 -->
  <div class="pagination" id="pagination">
    <button class="page-btn" id="prevBtn" onclick="prevPage()">←</button>
    <div class="page-nums" id="pageNums"></div>
    <button class="page-btn" id="nextBtn" onclick="nextPage()">→</button>
  </div>

</section>

<hr class="divider">

<!-- About -->
<section class="section" id="about">
  <div class="about-grid">
    <img src="https://raw.githubusercontent.com/xyu668668-glitch/my-blog-v2/main/avatars/author-avatar.png" class="about-avatar" alt="">
    <div class="about-text">
      <h3>关于我</h3>
      <p>记录工作里的思考、投资中的实践、生活中的发现。坚信好的工具和方法能让每一天都更从容。</p>
      <div class="about-stats">
        <div class="stat"><span class="stat-num">21</span><span class="stat-label">文章</span></div>
        <div class="stat"><span class="stat-num">3</span><span class="stat-label">只基金</span></div>
        <div class="stat"><span class="stat-num">∞</span><span class="stat-label">折腾中</span></div>
      </div>
    </div>
  </div>
</section>

<!-- Post Modals (hidden, populated by JS) -->
<div class="post-overlay" id="postOverlay" onclick="closePost(event)">
  <button class="close-btn" onclick="closePostDirect()">✕</button>
  <div class="post-modal">
    <img src="" class="post-modal-img" id="postImg" alt="">
    <div class="post-modal-body">
      <div class="post-modal-meta" id="postMeta"></div>
      <h1 class="post-modal-title" id="postTitle"></h1>
      <div class="post-modal-content" id="postContent"></div>
    </div>
  </div>
</div>

<button class="back-top" id="backTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
const posts = [

  
  {
    id: 25,
    title: "每日大佬说 · 凯西·伍德（木头姐）：颠覆式创新与ARK投资视角",
    date: "2026-04-19",
    tag: "投资",
    tagClass: "tag-invest",
    img: "https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?w=1200&q=85&fit=crop",
    content: `
      <p>「每日大佬说」专注投资与商业人物深度观点记录。本文整理凯西·伍德（木头姐）的核心商业逻辑与投资思想，言之有物，有数据支撑。</p>

      <blockquote>
        <p><strong>凯西·伍德（木头姐）</strong>（Cathie Wood）</p>
        <p>ARK Invest 创始人，专注颠覆式创新的ETF女皇，以押注高成长科技股闻名。</p>
        <p>收录日期：2026-04-19 · 周二</p>
      </blockquote>


      <h2>一、ARK 2025年真实战绩：惨烈回撤后强势反弹</h2>
      <p>2022年是ARK最艰难的一年，旗舰基金ARKK跌幅超过67%，被媒体称为'木头姐的崩塌之年'。但许多人没有注意到的是：2023年ARKK上涨约62%，2024年上涨约47%，2025年受益于AI浪潮继续走高。如果从2020年低点持有到2025年底，累积回报仍远超同期标普500。这说明她的核心逻辑——颠覆式创新长期兑现——从未失效，只是兑现的时间窗口比市场预期更久。</p>
      <p>木头姐在2024年致股东信中坦承：'我们过早买入了许多标的，付出的时间成本比预期更长。'但她同时指出，'成本曲线的下降速度比我们预测的更快，一旦越过临界点，营收增长将呈指数级爆发。'这种认错但不改变框架的姿态，是理解她的关键。</p>

      <h2>二、持仓结构：从'科技垃圾'到'AI基础设施'</h2>
      <p>ARK的核心持仓经历了明显演变。早期重仓特斯拉（最高占组合30%以上）、Zoom、Roku等高估值成长股，这些公司在利率上升周期中遭受重创。但木头姐并未死守，而是动态调整：2023年后逐步增持英伟达（GPU是AI的基础设施）、Coinbase（加密在监管明确后迎来新生）、UiPath（自动化AI）等。这一转变说明，她并非教条式持有，而是围绕'颠覆式创新'这一底层逻辑在迭代。</p>
      <p>值得注意的是，ARK的旗舰ETF ARKK费率约0.75%，远高于传统指数基金，但其换手率在2022年后大幅下降——木头姐选择'躺平'持有，放弃了高抛低吸的择时收益。这与她'给颠覆式创新5-7年兑现窗口'的理念完全一致。</p>

      <h2>三、为何市场始终不信任她：论证她的核心错误</h2>
      <p>批评者的核心论点是：木头姐的估值模型依赖'成本曲线下降→需求爆发'的假设，但现实中，从技术成熟到商业变现之间，有监管风险、竞争加剧、用户习惯迁移等多重摩擦。特斯拉是最好的例子：股价从峰值下跌超过70%，尽管公司本身销量持续增长。这说明资本市场的'定价'与'基本面'之间存在巨大的时间差，木头姐赌的是基本面，但持有者承受的是定价波动。</p>
      <p>另一个弱点是她的集中持仓策略。ARKK前十大持仓通常占组合60-70%，单一股票如特斯拉可以在2020年贡献整个组合40%的涨幅，也可以在2022年拖累整体40%。这种高集中度让她的基金更像是一只主动选股工具，而非分散化的ETF——投资者买她的基金，实际上是在买她对那5-10只股票的判断力。</p>

      <h2>四、她真正值得学习的：不是买什么，而是不买什么</h2>

      <p>对于普通投资者而言，与其争论木头姐对错，不如问一个问题：'你是否相信未来5-10年，颠覆式创新的某个赛道会诞生10倍股？'如果答案是'是'，ARK提供了一个人工筛选过的赌注；如果答案是'不确定'，定投标普500+纳斯达克100的组合，胜算反而更高。'高波动性不是风险，对波动性的错误预期才是风险。'——这才是木头姐真正有价值的一句话。</p>

function showPost(id) {
  const post = posts.find(p => p.id === id);
  if (!post) return;
  document.getElementById('postImg').src = post.img;
  document.getElementById('postMeta').innerHTML =
    `<span class="tag ${post.tagClass}">${post.tag}</span><span class="card-date">${post.date}</span>`;
  document.getElementById('postTitle').textContent = post.title;
  document.getElementById('postContent').innerHTML = post.content;
  document.getElementById('postOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closePost(e) {
  if (e.target === document.getElementById('postOverlay')) closePostDirect();
}
function closePostDirect() {
  document.getElementById('postOverlay').classList.remove('active');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closePostDirect(); });

window.addEventListener('scroll', () => {
  document.getElementById('backTop').classList.toggle('show', window.scrollY > 600);
});

// ── 分页 + 筛选 ──
function buildArticleList() {
  const container = document.getElementById('articleList');
  if (!container) return;
  container.innerHTML = posts.map(post => `
    <div class="article-item" data-tag="${post.tag}" onclick="showPost(${post.id})">
      <span class="article-num"></span>
      <div class="article-info">
        <div class="article-meta">
          <span class="tag ${post.tagClass}">${post.tag}</span>
          <span class="article-date">${post.date}</span>
        </div>
        <h3 class="article-title">${post.title}</h3>
        <p class="article-excerpt">${post.excerpt || ''}</p>
      </div>
      <img src="${post.img}" class="article-thumb" alt="">
    </div>
  `).join('');
}

const PAGE_SIZE = 10;
let currentFilter = 'all';
let currentPage = 1;

function getVisibleItems() {
  return Array.from(document.querySelectorAll('#articleList .article-item'));
}

function getFilteredItems() {
  const items = getVisibleItems();
  if (currentFilter === 'all') return items;
  return items.filter(item => item.dataset.tag === currentFilter);
}

function getTotalPages(items) {
  return Math.max(1, Math.ceil(items.length / PAGE_SIZE));
}

function renderPage() {
  const items = getFilteredItems();
  const totalPages = getTotalPages(items);

  // Clamp current page
  if (currentPage > totalPages) currentPage = totalPages;
  if (currentPage < 1) currentPage = 1;

  // Show/hide items
  getVisibleItems().forEach(item => item.dataset.hidden = 'true');
  const start = (currentPage - 1) * PAGE_SIZE;
  const pageItems = items.slice(start, start + PAGE_SIZE);
  pageItems.forEach(item => item.dataset.hidden = 'false');

  // Build page numbers
  const pageNums = document.getElementById('pageNums');
  pageNums.innerHTML = '';

  if (totalPages <= 7) {
    for (let i = 1; i <= totalPages; i++) addPageNum(i, pageNums);
  } else {
    addPageNum(1, pageNums);
    if (currentPage > 3) pageNums.innerHTML += '<span class="page-ellipsis">…</span>';
    for (let i = Math.max(2, currentPage - 1); i <= Math.min(totalPages - 1, currentPage + 1); i++) {
      addPageNum(i, pageNums);
    }
    if (currentPage < totalPages - 2) pageNums.innerHTML += '<span class="page-ellipsis">…</span>';
    addPageNum(totalPages, pageNums);
  }

  document.getElementById('prevBtn').disabled = currentPage <= 1;
  document.getElementById('nextBtn').disabled = currentPage >= totalPages;
}

function addPageNum(i, container) {
  const btn = document.createElement('button');
  btn.className = 'page-num' + (i === currentPage ? ' active' : '');
  btn.textContent = i;
  btn.onclick = () => { currentPage = i; renderPage(); };
  container.appendChild(btn);
}

function setFilter(tag) {
  currentFilter = tag;
  currentPage = 1;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === tag));
  renderPage();
}

function prevPage() { if (currentPage > 1) { currentPage--; renderPage(); } }
function nextPage() {
  const items = getFilteredItems();
  if (currentPage < getTotalPages(items)) { currentPage++; renderPage(); }
}

// Init on load
document.addEventListener('DOMContentLoaded', () => { buildArticleList(); renderPage(); });
</script>
