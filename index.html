<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的博客</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #1c2128;
      --border: #30363d;
      --text: #e6edf3;
      --text2: #8b949e;
      --accent: #58a6ff;
      --accent2: #1f6feb;
      --tag-work: #3b82f6;
      --tag-invest: #10b981;
      --tag-life: #f59e0b;
      --tag-tech: #8b5cf6;
      --tag-book: #ec4899;
      --tag-eff: #14b8a6;
    }

    body {
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }

    /* ── Hero ── */
    .hero {
      position: relative;
      height: 100vh;
      min-height: 600px;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute; inset: 0;
      background: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=1800&q=90&fit=crop') center/cover no-repeat;
    }

    .hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(13,17,23,0.2) 0%,
        rgba(13,17,23,0.4) 50%,
        rgba(13,17,23,0.92) 100%
      );
    }

    .hero-content {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 0 20px;
    }

    .hero-badge {
      display: inline-block;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 4px 14px;
      border-radius: 99px;
      margin-bottom: 28px;
    }

    .hero h1 {
      font-size: clamp(2.5rem, 7vw, 5.5rem);
      font-weight: 800;
      line-height: 1.1;
      color: #fff;
      margin-bottom: 20px;
    }

    .hero-desc {
      font-size: 1.15rem;
      color: var(--text2);
      max-width: 520px;
      margin-bottom: 40px;
    }

    .hero-scroll {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: var(--text2);
      font-size: 0.8rem;
      animation: bounce 2s infinite;
      text-decoration: none;
    }

    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(8px); }
    }

    .hero-scroll svg { width: 20px; height: 20px; }

    /* ── Nav ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 16px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(13,17,23,0.75);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .nav-logo {
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
      text-decoration: none;
      letter-spacing: -0.02em;
    }

    .nav-links {
      display: flex;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      color: var(--text2);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: var(--text); }

    /* ── Signal images in article ── */
    .post-signal-imgs {
      display: flex;
      flex-direction: column;
      gap: 24px;
      margin: 24px 0;
    }
    .post-signal-imgs img {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    .post-signal-imgs .img-label {
      font-size: 0.78rem;
      color: var(--text2);
      text-align: center;
      margin-top: -16px;
      letter-spacing: 0.06em;
    }

    /* ── Section ── */
    .section {
      max-width: 1100px;
      margin: 0 auto;
      padding: 100px 24px;
    }

    .section-label {
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
    }

    .section-title {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 800;
      color: #fff;
      margin-bottom: 16px;
    }

    .section-desc {
      color: var(--text2);
      max-width: 520px;
      margin-bottom: 60px;
    }

    /* ── Article List ── */
    .article-list { counter-reset: article-num; }

    .article-item {
      display: grid;
      grid-template-columns: 72px 1fr 140px;
      gap: 0 32px;
      align-items: center;
      padding: 28px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.2s;
    }

    .article-item:first-child { border-top: 1px solid var(--border); }

    .article-item:hover { background: rgba(88,166,255,0.03); }

    .article-num {
      font-size: 3rem;
      font-weight: 800;
      color: var(--border);
      line-height: 1;
      font-variant-numeric: tabular-nums;
      transition: color 0.3s;
      counter-increment: article-num;
      text-align: right;
    }

    .article-item:hover .article-num { color: var(--accent); opacity: 0.5; }

    .article-info { min-width: 0; }

    .article-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .tag {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      padding: 2px 8px;
      border-radius: 99px;
      color: #fff;
    }
    .tag-work { background: var(--tag-work); }
    .tag-invest { background: var(--tag-invest); }
    .tag-life { background: var(--tag-life); }
    .tag-tech { background: var(--tag-tech); }
    .tag-book { background: var(--tag-book); }
    .tag-eff { background: var(--tag-eff); }

    .article-date { font-size: 0.75rem; color: var(--text2); }

    .article-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
      line-height: 1.4;
      transition: color 0.2s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .article-item:hover .article-title { color: var(--accent); }

    .article-excerpt {
      font-size: 0.82rem;
      color: var(--text2);
      line-height: 1.5;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .article-thumb {
      width: 140px;
      height: 88px;
      object-fit: cover;
      border-radius: 8px;
      display: block;
      opacity: 0.7;
      transition: opacity 0.3s;
    }

    .article-item:hover .article-thumb { opacity: 1; }

    @media (max-width: 768px) {
      .article-item { grid-template-columns: 48px 1fr; gap: 0 16px; }
      .article-thumb { display: none; }
      .article-num { font-size: 2rem; }
    }

    /* ── Filter Bar ── */
    .filter-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 40px;
    }

    .filter-btn {
      padding: 6px 16px;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text2);
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── Pagination ── */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 60px;
    }

    .page-btn {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text2);
      font-size: 0.85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .page-btn:hover:not(:disabled) {
      border-color: var(--accent);
      color: var(--accent);
    }

    .page-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .page-nums {
      display: flex;
      gap: 6px;
    }

    .page-num {
      min-width: 36px;
      height: 36px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text2);
      font-size: 0.85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      padding: 0 6px;
    }

    .page-num:hover { border-color: var(--accent); color: var(--accent); }
    .page-num.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .page-ellipsis {
      color: var(--text2);
      font-size: 0.85rem;
      padding: 0 4px;
    }

    .result-count {
      text-align: center;
      color: var(--text2);
      font-size: 0.8rem;
      margin-top: 20px;
      margin-bottom: -20px;
    }

    /* Hidden article items */
    #articleList .article-item[data-hidden="true"] { display: none; }

    /* ── About ── */
    .about-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 40px;
      align-items: start;
    }

    .about-avatar {
      width: 120px;
      height: 120px;
      border-radius: 24px;
      object-fit: cover;
      border: 2px solid var(--border);
      display: block;
      flex-shrink: 0;
    }

    .about-text h3 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: #fff;
    }

    .about-text p {
      color: var(--text2);
      font-size: 0.95rem;
      margin-bottom: 24px;
      max-width: 480px;
    }

    .about-stats {
      display: flex;
      gap: 40px;
    }

    .stat { text-align: center; }

    .stat-num {
      font-size: 2rem;
      font-weight: 800;
      color: var(--accent);
      display: block;
    }

    .stat-label {
      font-size: 0.78rem;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* ── Divider ── */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0 24px;
    }

    /* ── Post Detail ── */
    .post-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,0.85);
      overflow-y: auto;
    }

    .post-overlay.active { display: block; }

    .post-modal {
      max-width: 720px;
      margin: 60px auto;
      background: var(--surface);
      border-radius: 20px;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .post-modal-img {
      width: 100%;
      height: 320px;
      object-fit: cover;
    }

    .post-modal-body { padding: 48px; }

    .post-modal-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .post-modal-title {
      font-size: 2rem;
      font-weight: 800;
      line-height: 1.3;
      color: #fff;
      margin-bottom: 28px;
    }

    .post-modal-content { color: var(--text); font-size: 1rem; line-height: 1.9; }
    .post-modal-content h2 { font-size: 1.3rem; margin: 32px 0 12px; color: #fff; }
    .post-modal-content p { margin-bottom: 16px; }
    .post-modal-content ul { margin: 0 0 16px 20px; }
    .post-modal-content li { margin-bottom: 6px; }
    .post-modal-content blockquote {
      border-left: 3px solid var(--accent);
      padding: 12px 20px;
      margin: 24px 0;
      background: var(--surface2);
      border-radius: 0 8px 8px 0;
      color: var(--text2);
      font-style: italic;
    }
    .post-modal-content strong { color: #fff; }

    .close-btn {
      position: fixed;
      top: 24px;
      right: 32px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 201;
      transition: background 0.2s;
    }

    .close-btn:hover { background: var(--surface2); }

    /* Back btn */
    .back-top {
      position: fixed;
      bottom: 32px;
      right: 32px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--accent2);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: none;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 50;
    }

    .back-top.show { opacity: 1; }

    @media (max-width: 768px) {
      nav { padding: 14px 20px; }
      .nav-links { display: none; }
      .section { padding: 60px 16px; }
      .about-grid { grid-template-columns: 1fr; gap: 32px; }
      .about-avatar { width: 80px; height: 80px; }
      .post-modal-body { padding: 28px 20px; }
      .post-modal-title { font-size: 1.5rem; }
      .post-modal-img { height: 220px; }
    }
  </style>
</head>
<body>

<!-- Nav -->
<nav>
  <a href="#" class="nav-logo">博客</a>
  <ul class="nav-links">
    <li><a href="#articles">文章</a></li>
    <li><a href="#about">关于</a></li>
  </ul>
</nav>

<!-- Hero -->
<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <span class="hero-badge">Personal Blog</span>
    <h1>记录生活<br>沉淀思考</h1>
    <p class="hero-desc">法制工作 · 投资实践 · 效率工具 · 城市探索</p>
    <a href="#articles" class="hero-scroll">
      <span>向下滚动</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 10l5 5 5-5"/></svg>

<!-- Articles -->
<section class="section" id="articles">

  <h2 class="section-title">全部文章</h2>
  <p class="section-desc">记录工作中的思考、投资里的实践、生活中的发现。</p>

  <!-- 标签筛选 -->
  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">全部</button>
    <button class="filter-btn" data-filter="工作" onclick="setFilter('工作')">工作</button>

    <button class="filter-btn" data-filter="效率" onclick="setFilter('效率')">效率</button>
    <button class="filter-btn" data-filter="技术" onclick="setFilter('技术')">技术</button>

    <div id="articleList"></div>

  <!-- 分页 -->
  <div class="pagination" id="pagination">
    <button class="page-btn" id="prevBtn" onclick="prevPage()">←</button>
    <div class="page-nums" id="pageNums"></div>
    <button class="page-btn" id="nextBtn" onclick="nextPage()">→</button>
  </div>

</section>

<hr class="divider">

<!-- About -->
<section class="section" id="about">
  <div class="about-grid">
    <img src="https://raw.githubusercontent.com/xyu668668-glitch/my-blog-v2/main/avatars/author-avatar.png" class="about-avatar" alt="">
    <div class="about-text">
      <h3>关于我</h3>
      <p>记录工作里的思考、投资中的实践、生活中的发现。坚信好的工具和方法能让每一天都更从容。</p>
      <div class="about-stats">
        <div class="stat"><span class="stat-num">22</span><span class="stat-label">文章</span></div>
        <div class="stat"><span class="stat-num">3</span><span class="stat-label">只基金</span></div>
        <div class="stat"><span class="stat-num">∞</span><span class="stat-label">折腾中</span></div>
      </div>
    </div>
  </div>
</section>

<!-- Post Modals (hidden, populated by JS) -->
<div class="post-overlay" id="postOverlay" onclick="closePost(event)">
  <button class="close-btn" onclick="closePostDirect()">✕</button>
  <div class="post-modal">

      <div class="post-modal-meta" id="postMeta"></div>
      <h1 class="post-modal-title" id="postTitle"></h1>
      <div class="post-modal-content" id="postContent"></div>
    </div>
  </div>
</div>

<button class="back-top" id="backTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
const posts = [

  {
    id: 28,
    title: "每日大佬说 · 杰夫·贝索斯：长期主义与商业哲学",
    date: "2026-04-01",
    tag: "投资",
    tagClass: "tag-invest",
    img: "https://upload.wikimedia.org/wikipedia/commons/0/03/Jeff_Bezos_visits_LAAFB_SMC_%283908618%29_%28cropped%29.jpeg",
    content: `
      <p>「每日大佬说」专注投资与商业人物深度观点记录。本文整理杰夫·贝索斯的核心商业逻辑与投资思想，言之有物，有数据支撑。</p>

      <blockquote>
        <p><strong>杰夫·贝索斯</strong>（Jeff Bezos）</p>
        <p>亚马逊创始人，全球电商与云计算先驱，蓝色起源创始人，以"第一天心态"闻名。</p>
        <p>收录日期：2026-04-01 · 周五</p>
      </blockquote>


      <h2>一、"第一天"心态：如何在成功后保持紧迫感</h2>
      <p>贝索斯每年给股东写信都会强调：亚马逊永远处于'第一天（Day 1）'状态——即公司永远像创业第一天那样充满紧迫感、客户导向和冒险精神。'第二天是停滞，然后是衰退，然后是死亡。这就是为什么我们永远不做第二天。'这句话的语境是：随着公司规模扩大，官僚主义、风险规避和'足够好了'的心态会自然滋生——这是大公司的普遍病症。贝索斯对此的解药是：永远把自己当作一家小型创业公司来思考决策。</p>
      <p>'Day 1'心态在实践中的体现，首先是拒绝'过程导向'的管理文化。贝索斯在2015年致股东信中专门批判了'流程导向型'组织：一旦组织开始用流程来代替判断力，员工就会把精力花在'遵循流程'而非'创造价值'上，最终结果是组织僵化、创新停滞。亚马逊的应对方式是：保持小团队结构（著名的'两个比萨团队'原则）、鼓励公开辩论决策、快速试错迭代。AWS（云计算）最初只是一个小团队在做内部基础设施服务——正是这种'Day 1'心态，让亚马逊能在巨头林立的科技行业持续找到新的增长点。</p>
      <p>对于个人而言，'Day 1'心态的启示是：无论你现在处于什么位置，永远假设自己还需要证明自己。职场中的'第二天'症状包括：开始依赖过去的成绩、拒绝学习新技能、用'经验'代替'思考'。贝索斯的做法是：每年重新审视'如果我现在刚创业，我会做同样的选择吗？'——如果不是，就必须改变。</p>

      <h2>二、AWS：如何把内部需求变成万亿市场</h2>
      <p>亚马逊云服务（AWS）的诞生，是商业史上最具启发性的战略案例之一。2000年代初，亚马逊的工程师团队需要一个强大的基础设施来运行网站的计算和存储——贝索斯决定开发一套内部工具来解决这个问题。随后他意识到：全球数百万家企业的IT需求，与当年亚马逊工程师面临的问题高度相似。如果这套系统可以内部使用，那么对外销售也应该是可行的——亚马逊的AWS就这样诞生了。'把自己需要的东西变成别人的生意'——这是亚马逊最经典的思维模式，也是AWS能成为全球最大云服务商的起点。</p>
      <p>AWS的战略意义远超过一个产品线。它本质上是把亚马逊的核心能力——大规模基础设施运营——转化为一个可对外销售的服务平台，并将数百万企业变成了亚马逊生态系统的深度用户。这一战略的精明之处在于：竞争对手一旦落后，就很难追赶——企业用户一旦将数据和应用迁移到AWS上，转换成本极高，AWS的收入就会呈现极强的锁定效应（lock-in）和规模效应。2025年，AWS年营收突破1300亿美元，约占亚马逊整体利润的60%以上，成为亚马逊最赚钱的业务。</p>
      <p>对于创业者和企业家的启示是：不要把'内部需求'视为成本，而应该视为潜在的产品机会。当你自己解决了一个难题，而这个难题同样存在于你的竞争对手或整个行业中时，这个解决方案本身就可能是一笔生意。贝索斯说：'你的邻居遇到的问题，就是你的机会。'亚马逊先解决自己的问题，然后向全世界销售这个解决方案——这是最真实的创业逻辑。</p>

      <h2>三、客户至上：为什么它是护城河，而不是负担</h2>
      <p>贝索斯在1997年的第一封致股东信中写道：'我们选择将客户满意度放在第一位，即使这会牺牲短期利润。'2026年，这封信的14条原则依然是亚马逊所有业务的北极星。'客户永远是不满足的——这是好事。'贝索斯解释道：不满足意味着有改进空间，意味着有创造更好体验的机会。而'满足'往往是竞争对手的最佳切入口——当一家公司满足于现状，用户就成了最脆弱的资产。</p>
      <p>亚马逊的'客户至上'战略，建立在对客户行为深刻理解的基础上。Prime会员体系（两日达→一日达→当日达→Prime Video）不是简单的物流提速，而是一个完整的用户价值闭环：用户支付年费后，购买频次平均增加3倍以上——这让亚马逊在获客成本不变的情况下，大幅提升每个用户的终身价值。与此同时，亚马逊开放第三方市场（FBM/FBA），让竞争对手既是平台上的卖家，又不得不依赖亚马逊的物流和广告服务——这是一种极其高明的竞争战略：把潜在的敌人变成生态的一部分。</p>
      <p>批评者常质疑：亚马逊长期不追求利润，把利润再投资于扩张，是不是一种'不可持续'的商业模式？但换个角度看，亚马逊的逻辑是：在一个赢家通吃的市场中，优先追求市场份额和用户规模，比追求短期利润更理性——因为一旦建立了足够深的护城河（用户习惯、物流网络、AWS生态），利润自然会随之而来。2014年之后，亚马逊的自由现金流开始持续爆发增长，证明了这一逻辑的长期有效性。</p>

      <h2>四、对创业者的忠告：长期思维是战略资产</h2>
      <p>贝索斯给创业者的第一条忠告是：'选择那些让你激动的冒险，而非看起来安全的路。'亚马逊在1997年选择了一条在当时看来几乎不可能的道路——在网上卖书并建立全国性物流网络。传统零售巨头嘲笑这一想法，但贝索斯的逻辑是：实体书店最多只能容纳10万种书籍，而互联网可以容纳无限多。选择'激动人心'的冒险，往往意味着选择那些'别人认为不可能'的方向——而这恰恰是竞争壁垒的来源。</p>
      <p>第二条忠告：'想法不值钱，执行才是壁垒。'贝索斯认为，市场上99%的想法都会失败，不是因为想法本身不够好，而是因为执行不到位。一个想法，如果1000个人同时想到，只有执行最好的那个人能赢。执行的核心在于速度：快速推出最小可行产品（MVP）、快速收集用户反馈、快速迭代——而不是等到'产品完美'才发布。这是亚马逊能在多个领域（电商、云服务、智能音箱）持续保持领先地位的关键：不是第一个进入，而是用最快的速度把产品做到极致。</p>
      <p>第三条忠告：'长期思维让你敢于做短期看起来疯狂的决定。'2005年，亚马逊推出Prime会员服务——在当时，几乎所有人都认为这是疯狂的决定：79美元的年费，无限次两日达，这个成本结构在任何传统零售商的账本上都是灾难。但贝索斯看到的是：Prime用户的高频次购买，会让物流成本随着订单密度增加而摊薄——这个逻辑最终被证明是正确的，Prime成为亚马逊最强大的用户粘性工具。同样的逻辑，让亚马逊敢于在2006年进入云计算、2014年推出Echo智能音箱、2023年投入生成式AI。长期思维不是浪漫的情怀，而是经过严格计算的理性冒险。</p>

      <h2>一、25种人类误判心理：投资的最大的敌人是你自己</h2>
      <p>芒格最深刻的洞见之一，是将心理学知识系统引入投资决策。他整理了25种最常见的人类心理倾向，并称之为'误判心理学'——它们是人类进化过程中形成的认知捷径，在远古环境中帮助人类快速决策，但在现代金融市场中却往往导致系统性错误。最重要的几种倾向包括：奖励与惩罚的超级反应倾向（激励机制对行为的塑造力远大于理性分析）、社会认同倾向（'别人都在买，所以我也要买'）、过度自信倾向（对自己的判断力系统性高估），以及损失厌恶（亏损的痛感是同等盈利快感的2-2.5倍）。</p>
      <p>理解这些心理倾向，对于投资的意义在于：市场泡沫和崩盘的背后，从来不只是'估值过高'那么简单，而是无数投资者的集体心理偏差在同一方向上叠加的结果。2000年互联网泡沫中，人们相信'这次不一样'——这是社会认同和过度自信的结合。2008年金融危机前，房贷机构明知风险却持续放贷——这是激励机制扭曲的结果。芒格说：'如果你知道自己在哪个地方会犯傻，你就已经比大多数人聪明了。'识别自己的心理弱点，是对抗它的第一步。</p>
      <p>实践建议：每次做出重大投资决策前，强制自己写下三个'反对意见'——如果找不到，说明你可能正处于某种心理偏差的影响下。另一个简单有效的做法是：设定机械化的定投规则（如每月固定金额投资），减少情绪对投资行为的干扰。这不是懦弱，而是承认自己作为人类，在市场剧烈波动面前的情绪反应往往是错的。</p>

      <h2>二、逆向思考法：先想清楚什么是错的</h2>
      <p>芒格最著名的思维工具之一是逆向思考。他在多次演讲中说：'如果我知道我会死在哪里，我就永远不去那个地方。'反过来思考，往往能找到问题的关键所在。应用到商业分析上，逆向思考意味着：与其问'这家公司为什么成功'，不如问'这家公司最可能在什么情况下失败'。如果失败的路径能被有效堵住，那么这家公司持续成功的概率就会大幅提升。他说：'如果要设计一家注定失败的公司，记住：不断降低产品质量、压缩研发投入、只看短期数字、忽视客户真实需求、让官僚主义蔓延。'反过来避免这些，就是投资的正道。</p>
      <p>芒格用可口可乐举过一个经典的逆向思考案例。1884年的亚特兰大，如果要设计一款注定失败的饮料，失败路径包括：口味过于刺激导致只有少数人接受、品牌名难以记忆、只在本地销售而没有扩张计划。可口可乐的创始人们反其道而行：设计了温和的普适口味、建立了强大的品牌、制定了全球化扩张的战略——正是这种有意识的'逆向设计'，让可口可乐成为人类历史上最持久的消费品之一。这种思维方式在今天同样适用：投资一家公司之前，不妨先问自己——这家公司最可能在哪里翻车？如果翻车的概率低且后果不致命，那么这可能就是一个值得持有的标的。</p>

      <h2>三、能力圈原则：知道自己的边界在哪里</h2>
      <p>'找出你自己的核心竞争力，然后待在那个圈子里。'——这是芒格投资哲学中最朴素、也最实用的一条原则。能力圈不是一成不变的，它需要通过持续学习来扩展。但扩展的前提是诚实评估：你真的理解这项业务吗？芒格和巴菲特花了50年，才将能力圈从早期的保险和消费，扩展到金融和部分科技公司。但他们始终回避公用事业、航空公司和大多数科技公司——直到他们认为时机成熟，才逐步建仓苹果、亚马逊。这一原则的现实意义是：承认'看不懂'是一种智慧，而不是弱点。</p>
      <p>芒格曾坦率承认，自己'永远都不会'投资比特币——因为在他看来，比特币没有内在价值，只是一种'老鼠药的平方'。无论这个判断最终是否正确，这种基于自身认知框架的明确拒绝态度，体现的是一种清晰的边界感。在能力圈内投资的另一个关键优势是：当你真正理解一家公司时，你更容易在股价短期下跌时保持冷静。因为你知道这家公司拥有某种超越短期波动的内在价值，而市场的非理性定价，恰恰是长期投资者超额收益的来源。芒格的忠告是：'对99%的事情说不，才能专注那1%真正重要的事。'投资如此，人生亦然。</p>

      <h2>四、跨学科思维：多元模型是判断力的基础设施</h2>
      <p>芒格最独特的地方，在于他坚持用多学科的思维框架来分析问题，而非单一视角。他说：'手里拿着锤子的人，看什么都像钉子。'专业分工越精细的领域，人们越容易陷入'专业偏见'——用自己熟悉的模型去套所有问题，结果往往是盲人摸象。芒格每天阅读400页以上，涉猎领域横跨历史、心理学、物理学、经济学、生物学、工程学。他不是在'博览群书'，而是在积累分析问题的'思维模型库'——每本书都在回答'世界是如何运作的'某个维度。例如，物理学中的'均衡'概念，帮助他理解市场价格终将向价值回归；生物学中的'适者生存'，帮助他理解企业护城河的动态性。</p>
      <p>对于普通人而言，这套方法论如何落地？芒格的建议是：不必成为每个领域的专家，但需要理解每个学科中最重要的几个概念。比如：概率论（理解期望值和尾部风险）、复利原理（理解时间和增长的关系）、心理学（理解人类如何做决策）。他说：'每天睡觉前比醒来时聪明一点点——这很重要。'投资回报，最终是认知变现的函数。你的判断力，取决于你积累了多少正确的思维模型，并在关键时刻调用它们。这或许才是芒格留给我们最珍贵的遗产：智慧不是天生的，而是通过有意识的、持续的学习，一点一点建立起来的。</p>

      <h2>一、桥水最新配置：黄金与去美元化的逻辑</h2>
      <p>桥水基金2026年致投资者信中明确表示：全球债务水平正处于历史最高区间，主要央行面临'通胀与衰退之间的两难困境'，传统的60/40股债组合策略正面临前所未有的挑战——当债券和股票同时受到通胀侵蚀时，传统的相关性假设失效。因此，桥水继续大幅持有黄金头寸，并将黄金配置比例提升至历史高位。达利欧的逻辑是：黄金是唯一不依赖任何政府信用、不受央行政策左右的储备资产。当主权债务不断膨胀、货币信用受到侵蚀时，黄金的相对价值会系统性提升。</p>
      <p>与此同时，桥水适度做多美元、做空欧元和日元。这一操作的背景是：美国虽然债务高企，但美元作为全球储备货币的特殊地位，叠加相对较好的经济增长前景，使其在短期内仍是最强的'丑中选美'标的。欧元区和日本则分别面临能源依赖和债务可持续性的双重压力。达利欧曾在2022年警告：'不要把所有的钱都放在任何单一货币上。'他的建议是构建包含美元、欧元、人民币、黄金和实物资产的多货币分散组合。这一观点的底层支撑，是他几十年研究历史上多次货币危机得出的规律：没有任何法定货币能长期维持其购买力。</p>

      <h2>二、债务周期理论：我们现在在哪里？</h2>
      <p>达利欧将债务周期分为两个层次：短期债务周期（5-10年），对应经济的扩张与收缩循环；长期债务周期（75-100年），对应一个经济体从信贷匮乏到债务饱和的全过程。当前，全球主要经济体正处于长期债务周期的'泡沫阶段'向'萧条阶段'的过渡期。具体标志包括：债务/GDP比率超过150%、央行货币政策空间耗尽（接近零利率或负利率）、以及日益加剧的社会冲突（贫富分化和代际矛盾）。历史上接近当前状态的案例，包括1929年大萧条前的美国、1989年泡沫破裂后的日本、以及2008年金融危机后的部分欧洲国家。</p>
      <p>达利欧认为，判断长期债务周期位置的关键指标有三个：第一，债务/GDP比率是否超过临界点——目前美国已超过120%，日本超过260%。第二，央行是否还有降息空间——目前全球主要央行利率已从零利率陷阱中有所回升，但整体仍处于历史低位。第三，社会冲突程度——贫富分化加剧、民粹主义抬头、政策极端化，都是周期进入后半段的信号。理解这一点，才能理解达利欧为什么强调'分散化是唯一免费的午餐'：当单一资产类别无法提供可靠的财富保值时，跨资产、跨货币、跨时间的分散配置，是唯一理性的选择。</p>

      <h2>三、中美博弈：修昔底德陷阱有多深？</h2>
      <p>达利欧在《原则：应对变化中的世界秩序》一书中，用大量历史案例论证了'修昔底德陷阱'——当一个崛起中的大国（当前是中国）挑战既有霸主（美国）时，地缘政治紧张往往不可避免。他明确指出：'中美关系的紧张将持续10-20年，在此期间，双方在经济、技术、军事和意识形态领域的摩擦会反复出现。'这并非悲观的预言，而是对历史规律的冷静分析——达利欧梳理了荷兰、英国、美国相继成为世界霸主的更替过程，每一次都伴随着漫长的竞争与冲突。</p>
      <p>对于投资者而言，这一判断的直接含义是：不要把赌注全部押在单一国家的资产上。达利欧建议投资者在全球范围内分散配置，涵盖美国（科技与金融）、中国（制造业与消费）、印度（人口红利与数字化）、日本（稳健的防御性资产）以及黄金和实物资产。同时，他特别强调关注'关键物资'的供应链安全——包括能源、粮食、半导体和医疗物资。这些领域在地缘政治冲突加剧时，往往成为各国博弈的焦点，相关资产也可能出现极端波动。对于普通投资者，这意味着：持仓组合中适当配置黄金ETF和海外资产，是对冲地缘政治尾部风险的成本最低的方式。</p>

      <h2>四、原则思维：如何在不确定中做决策</h2>
      <p>达利欧在《原则》一书中系统阐述了他的决策框架，其核心可以概括为两点：极度透明，以及快速纠错。极度透明，指的是在组织内部和个人决策中，尽可能让所有相关信息公开流通，减少信息不对称导致的判断失误。桥水基金以其'创意择优'（Believable Ideas Vote）制度闻名——无论职位高低，最好的论点获胜。这种机制在实践中极为罕见，因为多数组织天然倾向于'谁职级高谁说了算'。但达利欧认为，正是这种反直觉的制度，让桥水在市场判断上多次比主流共识更早发现问题。</p>
      <p>快速纠错，是达利欧决策框架的第二条支柱。他的核心理念是：'让自己正确，比总是正确更重要。'这两者有什么区别？总想证明自己正确的人，会本能地拒绝与己不利的证据，最终导致系统性误判。而'让自己正确'的人，目标是在每次决策时都保持开放心态，愿意接受被证明错误，并在发现错误时立即纠正。达利欧说：'大部分人最大的问题，不是他们犯错误，而是他们不承认错误。'这一原则应用到投资上，启示在于：建立系统性的止损机制、保持仓位的灵活性、定期审视自己的投资逻辑是否仍然成立——比预测下一次市场走势要重要得多。</p>

    date: "2026-04-10",

    tagClass: "tag-eff",
    img: "https://images.unsplash.com/photo-1455390582262-044cdead277a?w=1200&q=85&fit=crop",
    content: `
      <p>Word 是我用了十几年的写作工具，直到我开始频繁遇到这些问题：格式错乱、文件损坏、多设备同步困难、协作冲突。</p>
      <h2>Word 的三个噩梦</h2>
      <p>第一个噩梦是版本管理。每次改动都要另存文件，docx-v1、v2、v3、v4……最后自己都分不清哪个是最终版。第二个噩梦是格式刷。一篇文章调好格式，换到另一台电脑打开，字体全变了。第三个噩梦是协作。多人同时编辑一个文档，合并时灾难现场。</p>
      <blockquote>Word 解决的是排版问题，而不是写作本身。当写作和排版绑定在一起，两者都会变得脆弱。</blockquote>
      <h2>Markdown 带来的改变</h2>
      <p>切换到 Markdown 后，写作回归本质：内容。格式变成简单的标记符号，<code>#</code> 是标题，<code>**</code> 是加粗，<code>-</code> 是列表。文件就是一个纯文本，走到哪都能打开，永远不会损坏。</p>
      <h2>现在的写作流</h2>
      <p>Typora 写 Markdown → 导出 PDF 或 DOCX → 自动同步到 iCloud。这个流程我跑了两年，再没遇到过格式问题。</p>
    `
  },

    content: `
      <p>尼克拉斯·卢曼是德国社会学家，他一生写了70本书和400多篇论文，产量惊人。他的秘密是一个装满卡片的盒子——不是文件夹，是一个笔记系统。</p>
      <h2>核心思想</h2>
      <p>传统的笔记系统是按主题分类：读书笔记放这里，工作笔记放那里。卢曼的方法不一样：所有笔记都放在一个盒子里，用编号和引用来建立联系。一张卡片引用另一张，卡片之间形成网络，知识自己生长。</p>
      <blockquote>写作不是把脑子里的东西倒出来，而是通过写作来思考。卡片盒是思考的外骨骼。</blockquote>

      <p>卢曼笔记法有三个核心动作：<strong>闪念笔记</strong>（随手记下的想法，不加判断）、<strong>文献笔记</strong>（读完书后，用自己的话缩写，附上来源）、<strong>永久笔记</strong>（将闪念和文献整合，形成独立的思考片段，放入卡片盒）。</p>
      <h2>我的实践</h2>

    `
